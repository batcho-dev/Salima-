<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Salima — Claim Submitted</title>
<link rel="stylesheet" href="style.css"/>
<style>
.success-ring{width:88px;height:88px;border-radius:50%;background:rgba(16,185,129,.1);border:2px solid rgba(16,185,129,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:38px;animation:popIn .5s cubic-bezier(.34,1.56,.64,1) both}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.ref-tag{display:inline-block;background:var(--teal-dim);border:1px solid var(--border-blue);border-radius:20px;padding:6px 16px;font-size:12px;font-weight:600;color:var(--teal);margin-bottom:32px}
.timeline-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-xl);padding:24px;width:100%;margin-bottom:24px}
.tl-item{display:flex;align-items:flex-start;gap:14px;position:relative}
.tl-item:not(:last-child)::after{content:'';position:absolute;left:19px;top:40px;width:2px;height:28px;background:var(--border)}
.tl-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tl-icon.done{background:rgba(16,185,129,.1);border:1.5px solid rgba(16,185,129,.25)}
.tl-icon.active{background:rgba(245,158,11,.1);border:1.5px solid rgba(245,158,11,.25)}
.tl-icon.waiting{background:var(--card-bg);border:1.5px solid var(--border);opacity:.4}
.tl-title{font-size:14px;font-weight:600;margin-bottom:2px}
.tl-sub{font-size:12px;color:var(--muted)}
.momo-badge{background:var(--amber);color:var(--navy);font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;display:inline-block;margin-top:4px}
.action-row{display:flex;flex-direction:column;gap:10px;width:100%}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:200;overflow:hidden}
.dot{position:absolute;border-radius:50%;opacity:0;animation:fall linear forwards}
@keyframes fall{0%{opacity:1;transform:translateY(-10px)}100%{opacity:0;transform:translateY(110vh)}}
</style>
</head>
<body>
<div class="page">
  <nav class="nav"><div class="nav-logo">Sali<span>ma</span></div></nav>
  
  <div class="page-content pb-nav" style="display:flex;align-items:center;justify-content:center;min-height:80vh">
    <div style="max-width:400px;width:100%;text-align:center">
      <div class="success-ring">✅</div>
      <h2 class="font-display" style="font-size:26px;font-weight:800;margin-bottom:10px">Claim Submitted!</h2>
      <p class="text-muted mb-12">Your claim is being reviewed.<br>MoMo payout typically arrives within <strong>24 hours</strong>.</p>
      <div class="ref-tag" id="claimRef">Reference: SLM-2026-00491</div>

      <div class="timeline-card">
        <div class="tl-item"><div class="tl-icon done">📋</div><div><div class="tl-title">Claim Received</div><div class="tl-sub">Just now · Logged and queued</div></div></div>
        <div class="tl-item"><div class="tl-icon active">🔍</div><div><div class="tl-title">Auto Verification</div><div class="tl-sub">Receipt scan in progress</div></div></div>
        <div class="tl-item"><div class="tl-icon waiting">💸</div><div><div class="tl-title">MoMo Payout</div><div class="tl-sub">Sent to your mobile money</div><span class="momo-badge">MTN / Orange Money</span></div></div>
      </div>

      <div class="action-row">
        <button class="btn btn-primary btn-full" onclick="location.href='dashboard.html'">Back to Dashboard</button>
        <button class="btn-ghost btn-full" onclick="location.href='claim.html'">File Another Claim</button>
      </div>
    </div>
  </div>
</div>

<div class="confetti-wrap" id="confetti"></div>

<script>
// Load claim reference
const lastClaim = localStorage.getItem('salima_last_claim');
if (lastClaim) {
  try {
    const claim = JSON.parse(lastClaim);
    document.getElementById('claimRef').textContent = `Reference: ${claim.id}`;
  } catch(e) {}
}

// Confetti
const colors = ['#0ABFA3', '#10B981', '#F59E0B', '#1E6FE8'];
const wrap = document.getElementById('confetti');
for (let i = 0; i < 50; i++) {
  const dot = document.createElement('div');
  dot.className = 'dot';
  const size = Math.random() * 8 + 4;
  dot.style.cssText = `width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};left:${Math.random()*100}%;top:-10px;animation-duration:${Math.random()*2+1.5}s;animation-delay:${Math.random()*.8}s`;
  wrap.appendChild(dot);
}
setTimeout(() => wrap.remove(), 4000);
</script>
</body>
</html>
